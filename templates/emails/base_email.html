<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}UniAbsences{% endblock %}</title>
<style>
    body { margin: 0; padding: 0; background-color: #f4f6f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    .email-wrapper { max-width: 600px; margin: 0 auto; padding: 20px; }
    .email-header { background: linear-gradient(135deg, #003366 0%, #004080 100%); color: #ffffff; padding: 30px 24px; text-align: center; border-radius: 8px 8px 0 0; }
    .email-header h1 { margin: 0; font-size: 22px; font-weight: 600; }
    .email-header p { margin: 8px 0 0; opacity: 0.9; font-size: 14px; }
    .email-body { background: #ffffff; padding: 32px 24px; border-left: 1px solid #e9ecef; border-right: 1px solid #e9ecef; }
    .email-body p { margin: 0 0 16px; line-height: 1.6; color: #333333; font-size: 15px; }
    .alert-box { padding: 16px 20px; border-radius: 6px; margin: 20px 0; font-size: 14px; line-height: 1.5; }
    .alert-danger { background-color: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
    .alert-success { background-color: #d4edda; color: #155724; border-left: 4px solid #198754; }
    .alert-warning { background-color: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
    .alert-info { background-color: #d1ecf1; color: #0c5460; border-left: 4px solid #0dcaf0; }
    .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .stat-label { color: #6c757d; }
    .stat-value { font-weight: 600; color: #333333; }
    .email-footer { background-color: #f8f9fa; padding: 20px 24px; text-align: center; border-top: 1px solid #e9ecef; border-radius: 0 0 8px 8px; border-left: 1px solid #e9ecef; border-right: 1px solid #e9ecef; }
    .email-footer p { margin: 0; font-size: 12px; color: #6c757d; line-height: 1.5; }
</style>
</head>
<body>
<div class="email-wrapper">
    <div class="email-header">
        <h1>UniAbsences</h1>
        <p>{% block subtitle %}Syst&egrave;me de Gestion des Absences{% endblock %}</p>
    </div>
    <div class="email-body">
        {% block content %}{% endblock %}
    </div>
    <div class="email-footer">
        <p>Cet email a &eacute;t&eacute; envoy&eacute; automatiquement par le syst&egrave;me UniAbsences.<br>
        Veuillez ne pas r&eacute;pondre &agrave; ce message.</p>
    </div>
</div>
</body>
</html>
