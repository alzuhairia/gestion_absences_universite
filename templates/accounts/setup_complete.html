<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration terminée — UniAbsences</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" integrity="sha384-3B6NwesSXE7YJlcLI9RpRqGf2p/EgVH8BgoKTaUrmKNDkHPStTQ3EyoYjCGXaOTS" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #0d6efd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            max-width: 520px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: none;
            text-align: center;
            padding: 3rem 2rem;
        }
        .success-icon {
            width: 90px; height: 90px;
            background: #d4edda;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h2 class="mb-3">Configuration terminée</h2>
        <p class="text-muted mb-4">
            Le compte administrateur a été créé avec succès.<br>
            La page <code>/setup</code> est maintenant désactivée.
        </p>

        <div class="d-grid gap-2">
            <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </a>
            <a href="/admin/" class="btn btn-outline-secondary">
                <i class="fas fa-cogs me-2"></i>Interface d'administration Django
            </a>
        </div>

        <hr class="my-4">
        <p class="text-muted small mb-0">
            <i class="fas fa-info-circle me-1"></i>
            Depuis l'interface d'administration, vous pouvez créer des comptes secrétaire, professeur et étudiant.
        </p>
    </div>

    <script nonce="{{ request.csp_nonce }}" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
</body>
</html>
